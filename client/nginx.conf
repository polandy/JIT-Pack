# nginx serves the built SPA and reverse-proxies the API to the backend
# so the whole app lives on one origin — the Go server sets no CORS
# headers, so same-origin is a hard requirement. The API surface is three
# prefixes only (internal/api/server.go): /api/v1/, /ws, /health.

upstream backend {
    server app:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history routing (createWebHistory): unknown paths fall back to
    # index.html so client-side routes resolve on hard reload / deep link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend;
    }

    # WebSocket sync channel (spec §7) needs the HTTP upgrade dance.
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
