<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vite App</title>
    <script>
      // FR-21.4: apply the persisted theme before first paint — the
      // stylesheet defaults to dark (Mocha), so only Latte needs a tag.
      try {
        if (localStorage.getItem('jitpack_theme') === 'latte')
          document.documentElement.classList.add('jitpack-latte')
      } catch (e) { /* storage unavailable → dark default */ }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
