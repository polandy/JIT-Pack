# release-please reads the Conventional Commits history and maintains a
# release PR (CHANGELOG.md + next semver). Merging that PR creates the
# GitHub release and the v* tag.
#
# Tags created with the default GITHUB_TOKEN do not trigger other workflows,
# so the Docker image build is dispatched explicitly after a release.
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          release-type: go

      - name: Dispatch Docker image build for the new tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docker.yml --repo ${{ github.repository }} --ref ${{ steps.release.outputs.tag_name }}
