name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.txt ./...

      - name: Check coverage
        run: |
          go tool cover -func=coverage.txt
          overall=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | tr -d '%')
          echo "Overall coverage: ${overall}%"
          if [ "$(echo "$overall < 75" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${overall}% is below 75% threshold"
            exit 1
          fi
