name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race -count=1 -coverprofile=coverage.txt
      - name: Enforce coverage gates (working agreement)
        run: |
          check() {
            echo "$1 coverage: $2% (minimum $3%)"
            if awk -v c="$2" -v m="$3" 'BEGIN { exit !(c < m) }'; then
              echo "::error::$1 coverage $2% is below the $3% minimum"
              exit 1
            fi
          }
          overall=$(go tool cover -func=coverage.txt | awk '/^total:/ {gsub(/%/, ""); print $3}')
          sync=$(go test -cover ./internal/sync | awk '{for (i=1; i<=NF; i++) if ($i == "coverage:") {gsub(/%/, "", $(i+1)); print $(i+1)}}')
          check overall "$overall" 75
          check internal/sync "$sync" 90
      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      # The package scripts lint with --fix for local use; CI only checks.
      - run: npx oxlint .
      - run: npx eslint .
      - run: npm run build # runs type-check and the production build
      - run: npx vitest run

  # Headless-browser E2E (docs/UI_Test_Spec_v1.0.md). Drives the built
  # client (vite preview) in Chromium + WebKit. Gated after `client` so
  # it only runs on a green build; the backend-backed modes (single/
  # server) and their jitpackd harness land in later milestones, so this
  # currently exercises the backend-free smoke path only.
  e2e:
    needs: [client]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      # Cache the browser binaries; the key follows the lockfile, so a
      # Dependabot @playwright/test bump invalidates it automatically.
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}
      # `install` skips already-cached browsers; --with-deps still ensures
      # the apt system libraries each run (cheap, not cached).
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run build # vite preview serves this bundle
      - run: npm run test:e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  # Formats Go (gofmt) and the client (prettier) and pushes the fixes back,
  # so formatting is never a red build — it just gets applied. Skipped for
  # fork PRs, where GITHUB_TOKEN cannot push to the head branch.
  autoformat:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: gofmt -w cmd internal
      - run: npm ci
        working-directory: client
      - run: npm run format
        working-directory: client
      - name: Commit formatting fixes
        run: |
          if git diff --quiet; then
            echo "already formatted"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "style: apply automatic formatting"
          git push

  # Verifies the image still builds on every change; docker.yml only
  # builds and pushes on release tags.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: docker build .

  # Merges patch/minor Dependabot PRs once every check above is green.
  # Branch protection with required status checks is unavailable on a
  # free-plan private repo, so the gate lives here instead: `needs` makes
  # the merge wait for green by construction. Major updates stay open
  # for manual review.
  dependabot-merge:
    needs: [go, go-lint, client, e2e, docker-build]
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        id: metadata
      - if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
