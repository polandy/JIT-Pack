<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" fill="none">
  <!-- JIT-Pack brand lockup, Latte (light backgrounds). Check is a transparent
       cutout so the page shows through; accent is Catppuccin blue. -->
  <defs>
    <mask id="check-light">
      <rect width="64" height="64" fill="#fff"/>
      <polyline points="22 38.5,29.5 46,43 30.5" fill="none" stroke="#000" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <path d="M24 20.5v-4a8 8 0 0 1 16 0v4" fill="none" stroke="#1e66f5" stroke-width="5" stroke-linecap="round"/>
  <rect x="8" y="20.5" width="48" height="37" rx="10.5" fill="#1e66f5" mask="url(#check-light)"/>
  <text x="78" y="42" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#4c4f69">JIT</tspan><tspan fill="#1e66f5">·</tspan><tspan fill="#4c4f69">Pack</tspan>
  </text>
</svg>
